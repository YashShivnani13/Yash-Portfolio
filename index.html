    <style>
      html {
        scroll-behavior: smooth;
      }
      body {
        font-family: 'Space Mono', monospace;
        margin: 0;
        padding: 0;
        background-color: #000000;
        overflow-x: hidden; /* Only prevent horizontal scroll */
      }
      /* Custom scrollbar for content areas */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: rgba(255, 215, 0, 0.1);
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 215, 0, 0.5);
        border-radius: 4px;
      }
      
      /* Hide default cursor on desktop to show custom one */
      @media (pointer: fine) {
        body, a, button, input, textarea, select, [role="button"] {
          cursor: none !important;
        }
      }
    </style>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'astra-blue': '#000000', // Black
              'astra-pink': '#FFD700', // Gold
              'astra-accent': '#DAA520', // Goldenrod
            },
            fontFamily: {
              sans: ['Chakra Petch', 'sans-serif'],
              mono: ['Space Mono', 'monospace'],
            }
          }
        }
      }
